services:
  - type: web
    name: creative-scanner-pro
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # 2 GB RAM — required for Playwright/Chromium
    region: singapore       # Change to your preferred region

    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: HEADLESS
        value: "true"
      - key: ENGINE_CONCURRENCY
        value: "5"
      - key: ENGINE_NAV_TIMEOUT_MS
        value: "45000"
      # Set these manually in Render Dashboard:
      # DATABASE_URL        -> Railway PostgreSQL (scanner_db)
      # CRM_DATABASE_URL    -> Railway PostgreSQL (ctr_db)
      # API_KEY             -> Strong random string
      # ANTHROPIC_API_KEY   -> Optional Claude Vision key
      # ALLOWED_ORIGINS     -> https://your-app.netlify.app

    disk:
      name: scanner-data
      mountPath: /app/data
      sizeGB: 5
